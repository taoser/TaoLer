{extend name="public/base" /}

{block name="title"}管理员{/block}
{block name="body"}
	<div class="layui-card">
		<div class="layui-card-body">
			<form class="layui-form" action="">
				<div class="layui-row layui-col-space15">
					<div class="layui-col-md2">
						<label class="layui-form-label">用户名</label>
						<div class="layui-input-block">
							<input type="text" name="name" class="layui-input">
						</div>
					</div>
					<div class="layui-col-md2">
						<label class="layui-form-label">邮箱</label>
						<div class="layui-input-block">
							<input type="text" name="email" class="layui-input">
						</div>
					</div>
					<div class="layui-col-md2">
						<label class="layui-form-label">手机号</label>
						<div class="layui-input-block">
							<input type="text" name="phone" class="layui-input">
						</div>
					</div>
					<div class="layui-col-md2">
						<button class="pear-btn pear-btn-md pear-btn-primary" lay-submit lay-filter="user-query">
							<i class="layui-icon layui-icon-search"></i>
							查询
						</button>
						<button type="reset" class="pear-btn pear-btn-md">
							<i class="layui-icon layui-icon-refresh"></i>
							重置
						</button>
					</div>
				</div>
			</form>
		</div>
	</div>
	<div class="layui-card">
		<div class="layui-card-body">
			<table id="user-table" lay-filter="user-table"></table>
		</div>
	</div>

	<script type="text/html" id="user-toolbar">
		<button class="pear-btn pear-btn-primary pear-btn-md" lay-event="add">
			<i class="layui-icon layui-icon-add-1"></i>
			新增
		</button>
		<button class="pear-btn pear-btn-danger pear-btn-md" lay-event="batchRemove">
			<i class="layui-icon layui-icon-delete"></i>
			删除
		</button>
	</script>
	<script type="text/html" id="imgTpl"> 
		<img src= "/{{d.avatar}}" style="width: 30px; height: 30px;" />
	</script>
	<script type="text/html" id="user-bar">
		<button class="pear-btn pear-btn-primary pear-btn-sm" lay-event="edit"><i class="layui-icon layui-icon-edit"></i></button>
		<button class="pear-btn pear-btn-danger pear-btn-sm" lay-event="remove" {{#if (d.id == 1){ }} disabled {{# } }} ><i class="layui-icon layui-icon-delete"></i></button>
	</script>

	<script type="text/html" id="user-enable">
		<input type="checkbox" name="enable" value="{{d.id}}" {{#if (d.id == 1){ }} disabled {{# } }} lay-skin="switch" lay-text="启用|禁用" lay-filter="user-enable" {{ d.check == 1 ? 'checked' : '' }} />
	</script>

	<script type="text/html" id="buttonAuth">
		{{#  if(d.id == '1'){ }}
			<input type="checkbox" name="auth" lay-skin="primary"  checked disabled >
		{{#  } else { }}
			{if condition="checkRuleButton('admin/auth')"}<input type="checkbox" name="auth" lay-skin="primary" lay-filter="auth" {{# if(d.auth ==1){ }} checked value="0"{{#  } else { }}value="1"{{#  } }} id="{{d.id}}" >{else}<button class="pear-btn pear-btn-xs  pear-btn-disabled">无权限</button>{/if}
		{{#  } }}
	</script>

	<script type="text/html" id="user-login">
		{{#if (d.login == 0) { }}
		<span>在线</span>
		{{# }else if(d.sex == 1){ }}
		<span>离线</span>
		{{# } }}
	</script>

	<script type="text/html" id="user-createTime">
		{{layui.util.toDateString(d.createTime, 'yyyy-MM-dd')}}
	</script>

{__block__}

	<script>
		layui.use(['common','popup'], function() {
			let table = layui.table;
			let form = layui.form;
			let $ = layui.jquery;
			let common = layui.common;

			let cols = [
				[{
						type: 'checkbox'
					},
					{
						title: 'id',
						field: 'id',
						align: 'center',
						width: 60
					},
					{
						title: '头像',
						field: 'avatar',
						align: 'center',
						width: 80,
						templet: '#imgTpl'
					},
					{
						title: '账号',
						field: 'username',
						align: 'center',
						width: 100
					},
					{
						title: '电话',
						field: 'phone',
						align: 'center'
					},
					{
						title: '邮箱',
						field: 'email',
						align: 'center'
					},
					{
						title: 'IP',
						field: 'ip',
						align: 'center'
					},
					{
						title: '登录时间',
						field: 'logintime',
						align: 'center'
					},
					{
						title: '启用',
						field: 'check',
						align: 'center',
						width: 95,
						templet: '#user-enable'
					},
					{
						title: '登录',
						field: 'login',
						align: 'center',
						templet: '#user-login'
					},
					{
						title: '注册',
						field: 'jointime',
						align: 'center',
						templet: '#user-createTime'
					},
					{
						title: '操作',
						toolbar: '#user-bar',
						align: 'center',
						width: 130
					}
				]
			]

			table.render({
				elem: '#user-table',
				url: "{:url('system.admin/list')}",
				page: true,
				cols: cols,
				skin: 'line',
				toolbar: '#user-toolbar',
				defaultToolbar: [{
					title: '刷新',
					layEvent: 'refresh',
					icon: 'layui-icon-refresh',
				}, 'filter', 'print', 'exports']
			});

			table.on('tool(user-table)', function(obj) {
				if (obj.event === 'remove') {
					window.remove(obj);
				} else if (obj.event === 'edit') {
					edit(obj);
				}
			});

			table.on('toolbar(user-table)', function(obj) {
				if (obj.event === 'add') {
					add();
				} else if (obj.event === 'refresh') {
					window.refresh();
				} else if (obj.event === 'batchRemove') {
					window.batchRemove(obj);
				}
			});

			form.on('submit(user-query)', function(data) {
				table.reload('user-table', {
					where: data.field
				})
				return false;
			});

			//执行用户审核
			form.on('switch(user-enable)', function(obj) {
				var status = obj.elem.checked ? 1 : -1;
				$.ajax({
					type:'post',
					url:"{:url('system.admin/check')}",
					data:{"id": this.value, "status":status},
					dataType:'json',
					success:function(res){
						if(res.code === 0){
							return layui.popup.success(res.msg,function(){
								table.reload('user-table')
							});
						} else {
							return layui.popup.failure(res.msg);
						}
					}
				});
				return false;
			});

			let add = function() {
				layer.open({
					type: 2,
					title: '新增',
					shade: 0.1,
					area: [common.isModile()?'100%':'500px', common.isModile()?'100%':'450px'],
					content: 'add.html'
				});
			}

			let edit = function(obj) {
				layer.open({
					type: 2,
					title: '修改',
					shade: 0.1,
					area: ['500px', '450px'],
					content: 'edit.html?id=' + obj.data.id
				});
			}

			window.remove = function(obj) {
				layer.confirm('确定要删除该用户', {
					icon: 3,
					title: '提示'
				}, function(index) {
					layer.close(index);
					let loading = layer.load();
					$.ajax({
						url: "{:url('system.admin/delete')}?id=" + obj.data['id'],
						dataType: 'json',
						type: 'delete',
						success: function(res) {
							layer.close(loading);
							if (res.code === 0) {
								return layui.popup.success(res.msg,function(){
									obj.del();
									table.reload('user-table')
								});
							} else {
								return layui.popup.failure(res.msg);
							}
						}
					})
					return false;
				});
			}

			window.batchRemove = function(obj) {
				
				var checkIds = common.checkField(obj,'id');

				if (checkIds === "") {
					return layui.popup.warning('未选中任何数据');
				}
				
				layer.confirm('确定要删除这些用户', {
					icon: 3,
					title: '提示'
				}, function(index) {
					layer.close(index);
					let loading = layer.load();
					$.ajax({
						url: "{:url('system.admin/delete')}",
						dataType: 'json',
						type: 'delete',
						data:{"id":checkIds}, 
						success: function(res) {
							layer.close(loading);
							if (res.success) {
								return layui.popup.success(res.msg,function() {
									table.reload('user-table');
								});
							} else {
								return layui.popup.failure(res.msg);
							}
						}
					})
					return false;
				});
			}

			window.refresh = function(param) {
				table.reload('user-table');
			}
		})
	</script>

{/block}
